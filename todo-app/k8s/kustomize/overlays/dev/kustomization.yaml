apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: todo-dev

resources:
  - ../../base
  - secret.yaml

patches:
  - patch: |
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: todo-backend
  - patch: |
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: todo-frontend

images:
  - name: your-backend-image
    newName: todo-backend
    newTag: dev
  - name: your-frontend-image
    newName: todo-frontend
    newTag: dev